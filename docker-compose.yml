services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: asadaauto_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: asadaauto_scheduler
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.5
    container_name: asadaauto_db
    ports:
      - "33060:3306"
    environment:
      MARIADB_DATABASE: asadaauto
      MARIADB_USER: asadaauto
      MARIADB_PASSWORD: asadaauto
      MARIADB_ROOT_PASSWORD: root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
